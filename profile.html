<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TG Mini App</title>
    <!-- Telegram Web App Script (Head me load hona jaroori hai) -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            padding: 20px;
            margin: 0;
        }
        .card {
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        h3 { margin-top: 0; color: #2481cc; }
        p { margin: 5px 0; font-size: 14px; }
        .bold { font-weight: bold; }
        
        /* 🌟 प्रोफाइल फोटो के लिए नया डिज़ाइन */
        .avatar-container {
            text-align: center;
            margin-bottom: 15px;
        }
        .user-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid #2481cc;
            object-fit: cover;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
            margin: 0 auto;
        }
    </style>
</head>
<body>

    <h2>Welcome dear 👀</h2>
    <h4>🎧 Looking For A Music Bot? ✨Fast • Smooth • 24/7 Active, Play 🔍 Your Favorite Songs Instantly, Enjoy Music Without Hassle 🎶 Try It Once, You'll Love It 💞</h4>

    <!-- Feature 1: User Details -->
    <div class="card" id="user-card">
        <h3>👤 User Details (You)</h3>
        
        <!-- 🌟 नया प्रोफाइल फोटो का सेक्शन -->
        <div class="avatar-container">
            <!-- शुरू में एक डिफ़ॉल्ट यूजर इमेज लोड होगी -->
            <img id="u-avatar" class="user-avatar" src="https://cloudflare.com" alt="User DP">
        </div>

        <p><span class="bold">Name:</span> <span id="u-name">Loading...</span></p>
        <p><span class="bold">Username:</span> <span id="u-username">Loading...</span></p>
        <p><span class="bold">ID:</span> <span id="u-id">Loading...</span></p>
        <p><span class="bold">Language:</span> <span id="u-lang">Loading...</span></p>
    </div>
