<!DOCTYPE html>
<html>
<head>
  <style>
    .circle-image-left {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      object-fit: cover;
      
      /* इमेज को बाईं तरफ रखने और उसके दाएं-नीचे थोड़ी जगह छोड़ने के लिए */
      float: left;        
      margin-right: 20px; 
      margin-bottom: 20px;
    }

    /* यह कोड इमेज के बाद आने वाले टेक्स्ट को नीचे नहीं, बल्कि बगल में सेट करने में मदद करेगा */
    .container::after {
      content: "";
      clear: both;
      display: table;
    }
  </style>
</head>
<body>

<div class="container">
  <!-- आपकी गोल इमेज जो बाईं तरफ दिखेगी -->
  <img src="https://image-link.edgeone.app/1781343046943-ao9jxf.jpg" alt="Profile" class="circle-image-left">
  
  <!-- इमेज के बगल में दिखने वाला टेक्स्ट (अगर आप लिखना चाहें) -->
  <p>Developer & Support</p>
</div>

</body>
</html>
